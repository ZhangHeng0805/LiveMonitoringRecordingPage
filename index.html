<script>
    const fullUrl = window.location.href;
    const MainUrl = getMainUrl(fullUrl);


    function generateLink(links) {
        let html = "相关链接:";
        Object.keys(links).forEach(key => {
            html += `<a href="${links[key]}" target="_blank" class="ml-2 text-primary">${key}</a>`;
        })
        return html;
    }

    // 配置参数
    const REFRESH_INTERVAL = 30; // 刷新间隔（秒）
    const platformName = {DouYin: "抖音", Bili: "Bilibili", KuaiShou: "快手"};
    let refreshTimer = null;
    // let viewerUpdateTimers = []; // 存储观众数更新定时器
    // let recordTimeUpdateTimers = []; // 存储录制时间更新定时器
    // let likeCountUpdateTimers = []; // 存储点赞数更新定时器
    let isRefreshing = false; // 标记是否正在刷新中
    document.getElementById("other-links").innerHTML = generateLink(
        {"抖音作品解析": "DouYinVideoPares.html?url=" + encodeURIComponent(MainUrl)}
    );
    // 页面加载完成后初始化
    document.addEventListener("DOMContentLoaded", function () {
        // 初始化显示刷新间隔
        document.getElementById("refresh-interval").textContent = REFRESH_INTERVAL;
        // 绑定手动刷新按钮事件
        const refreshBtn = document.getElementById("manual-refresh-btn");
        refreshBtn.addEventListener("click", handleManualRefresh);
        // 首次加载数据
        fetchData();
        // 设置定时刷新
        startRefreshTimer();
    });

    // 处理手动刷新
    function handleManualRefresh() {
        // 如果正在刷新中，则不重复触发
        if (isRefreshing) return;

        // 点击时添加旋转动画
        const refreshIcon = document.querySelector("#manual-refresh-btn i");
        refreshIcon.classList.add("btn-refresh-active");

        // 触发数据刷新
        fetchData().then(() => {
            // 动画完成后移除类
            setTimeout(() => {
                refreshIcon.classList.remove("btn-refresh-active");
            }, 500);
        });
    }

    // 开始定时刷新
    function startRefreshTimer() {
        // 清除已有定时器
        if (refreshTimer) {
            clearInterval(refreshTimer);
        }
        // 设置新定时器
        refreshTimer = setInterval(fetchData, REFRESH_INTERVAL * 1000);
    }

    // 获取数据
    async function fetchData() {
        // 如果正在刷新中，则不重复触发
        if (isRefreshing) return;

        isRefreshing = true;
        showRefreshStatus("loading");

        try {
            // 发起API请求并设置超时
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000); // 10秒超时

            const response = await fetch(MainUrl + "api/", {
                signal: controller.signal,
            });

            clearTimeout(timeoutId); // 清除超时定时器

            // 检查响应状态
            if (!response.ok) {
                throw new Error(
                    `网络响应错误: ${response.status} ${response.statusText}`
                );
            }

            // 解析JSON数据
            const data = await response.json();
            console.log("获取的数据:", data);

            // 处理数据
            // data.time = formatDate(new Date());

            if (data.code !== 0) {
                throw new Error(`数据返回错误: ${data.message || "未知错误"}`);
            }

            updateUI(data);
            showRefreshStatus("success");
        } catch (error) {
            // 区分不同类型的错误
            let errorMessage = "获取数据失败";
            if (error.name === "AbortError") {
                errorMessage = "请求超时";
            } else if (error.message) {
                errorMessage = error.message;
            }

            console.error(errorMessage, error);
            showRefreshStatus("error");
        } finally {
            // 无论成功失败，都标记为不在刷新中
            isRefreshing = false;
        }
    }


    // 显示刷新状态
    function showRefreshStatus(status) {
        // 隐藏所有状态
        document.getElementById("refresh-indicator").classList.add("hidden");
        document.getElementById("refresh-success").classList.add("hidden");
        document.getElementById("refresh-error").classList.add("hidden");

        // 显示指定状态
        if (status === "loading") {
            document
                .getElementById("refresh-indicator")
                .classList.remove("hidden");
        } else if (status === "success") {
            document.getElementById("refresh-success").classList.remove("hidden");
            // 3秒后隐藏成功提示
            setTimeout(() => {
                document.getElementById("refresh-success").classList.add("hidden");
            }, 3000);
        } else if (status === "error") {
            document.getElementById("refresh-error").classList.remove("hidden");
        }
    }

    // 更新界面
    function updateUI(data) {
        // 更新时间显示
        const updateTime = data.time;
        document.getElementById("update-time").textContent = updateTime;
        document.getElementById("footer-update-time").textContent = updateTime;

        // 统计数据
        const totalRooms = data.data.length;
        const livingRooms = data.data.filter(
            (item) => item["room-status"] === "LIVING"
        ).length;
        const notLivingRooms = data.data.filter(
            (item) => item["room-status"] !== "LIVING"
        ).length;
        const recordingRooms = data.data.filter(
            (item) => item.recorder !== undefined && item.recorder.isRecord
        ).length;

        // 更新统计数字
        updateCounter("total-rooms", totalRooms);
        updateCounter("living-rooms", livingRooms);
        updateCounter("recording-rooms", recordingRooms);
        document.getElementById(
            "living-count"
        ).textContent = `${livingRooms} 个房间`;
        document.getElementById(
            "not-living-count"
        ).textContent = `${notLivingRooms} 个房间`;

        // 更新直播中房间列表
        const livingContainer = document.getElementById(
            "living-rooms-container"
        );
        livingContainer.innerHTML = "";

        // 更新未直播房间列表
        const notLivingContainer = document.getElementById(
            "not-living-rooms-container"
        );
        notLivingContainer.innerHTML = "";

        // 处理每个房间数据
        data.data.forEach((item, index) => {
            if (item["room-status"] === "LIVING") {
                // 直播中房间
                const roomElement = createLivingRoomElement(item, index);
                livingContainer.appendChild(roomElement);
            } else {
                // 未直播房间
                const roomElement = createNotLivingRoomElement(item, index);
                notLivingContainer.appendChild(roomElement);
            }
        });

        // 如果没有数据，显示提示
        if (livingRooms === 0) {
            livingContainer.innerHTML =
                '<div class="col-span-full text-center py-8 text-gray-500">暂无直播中的房间</div>';
        }

        if (notLivingRooms === 0) {
            notLivingContainer.innerHTML =
                '<div class="col-span-full text-center py-8 text-gray-500">暂无未直播的房间</div>';
        }
    }

    //创建直播间卡片头部
    function createRoomHeadElement(item) {
        const room = item.room;
        const living = room.living;
        return `<!-- 卡片头部 -->
                <div class="bg-primary/5 p-4 border-b border-gray-100">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            ${room.avatar ? `<img src="${room.avatar}" alt="${room.nickname || "未知主播"}" class="w-10 h-10 rounded-full object-cover mr-3">` : `<div class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center text-gray-400 mr-3"><i class="fa fa-user"></i></div>`}
                               <div>
                                    <h3 class="font-bold">${room.nickname || "未知主播"}</h3>
                                    <div class="flex items-center text-xs text-gray-500 mt-0.5">
                                        <span class="bg-primary/10 text-primary px-2 py-0.5 rounded mr-2">
                                            ${platformName[room.platform] || "未知平台"}
                                        </span>
                                        <span>房间ID: ${room.id || "未知"}</span>
                                        <span class="${living ? "bg-primary/10 text-gray-600" : "bg-gray-100 text-gray-600"} px-2 py-0.5 rounded ml-1">
                                            更新于${formatDate(new Date(room.updateTime))} | 频率: ${room.setting.delayIntervalSec + "s" || "未知"}
                                        </span>
                                    </div>
                                </div>
                        </div>
                        <span class="status-badge ${living ? "bg-success/20 text-success" : "bg-gray-200 text-gray-600"}">
                            <i class="fa fa-circle text-xs mr-1 animate-pulse"></i>${living ? "直播中" : "未直播"}
                            <button onClick="actionRefresh('${item.key}')"  class="ml-2"><i class="fa fa-refresh"></i></button>
                        </span>
                    </div>
                </div>`;
    }

    // 创建直播中房间元素
    function createLivingRoomElement(item, index) {
        const room = item.room;
        const recorder = item.recorder || {};

        // 创建元素
        const div = document.createElement("div");
        div.className =
            "bg-white rounded-xl overflow-hidden card-shadow hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1 opacity-0";
        div.style.animation = `fadeIn 0.3s ease-in-out ${
            index * 0.1
        }s forwards`;

        const startTime = room.startTime ? formatDate(new Date(room.startTime)) : "未知";
        // 平台特定信息网格
        let infoGridItems = `<div class="flex items-center">
                                <i class="fa fa-calendar text-primary mr-1"></i>
                                <span>开始时间: ${startTime}</span>
                            </div>`;

        // 哔哩哔哩直播间数据
        if (room.platform === "Bili") {
            infoGridItems += createLivingBiliInfoGridItems(room);
        }
        // 抖音直播间数据
        else if (room.platform === "DouYin") {
            infoGridItems += createLivingDouYinInfoGridItems(room);
        }
        // 快手直播间数据
        else if (room.platform === "KuaiShou") {

        }

        // 确定当前显示的观众数（用于封面显示）
        let displayViewers = 0;
        if (room.platform === "Bili") {
            displayViewers = room.viewers || 0;
        } else if (room.platform === "DouYin") {
            displayViewers = room.userCountStr || 0;
        }
        let isRecord = recorder.isRecord;
        div.innerHTML = `${createRoomHeadElement(item)}

                            <!-- 卡片内容 -->
                            <div class="p-4">
                                <!-- 直播封面与信息 -->
                                <div class="flex flex-col md:flex-row gap-4 mb-4" title="${room.statistics || ""}">
                                    <div class="relative flex-shrink-0">
                                        ${room.cover ? `<img src="${room.cover}" alt="直播封面" class="w-full md:w-48 h-32 object-cover rounded-lg">` : `<div class="w-full md:w-48 h-32 bg-gray-100 rounded-lg flex items-center justify-center text-gray-400"><i class="fa fa-television text-3xl"></i></div>`}
                                        <div class="absolute bottom-2 right-2 bg-black/60 text-white text-xs px-1.5 py-0.5 rounded viewer-count">
                                            ${formatNumber(displayViewers)} 观众
                                        </div>
                                    </div>

                                    <div class="flex-1">
                                        <h4 class="font-medium line-clamp-2 mb-2">${room.title || "无标题"}</h4>
                                        <div class="grid grid-cols-2 gap-2 text-sm text-gray-600">
                                            ${infoGridItems}
                                        </div>
                                    </div>
                                </div>

                                <!-- 录制信息 -->
                                <div class="bg-light rounded-lg p-3 mb-4 border border-gray-100">
                                    <div class="flex items-center justify-between">
                                        <h5 class="font-medium flex items-center ${isRecord ? "text-primary" : "text-gray"}">
                                            <i class="fa fa-film mr-1"></i> 录制状态: ${isRecord ? recorder.definition : "未开启录制"}
                                        </h5>
                                        <span class="status-badge bg-primary/20 ${isRecord ? "text-primary" : "text-gray"}">
                                            <i class="fa fa-circle text-xs mr-1 animate-pulse"></i>${isRecord ? "正在录制" : "未录制"}
                                        </span>
                                    </div>
                                    ${isRecord ? `<div class="grid grid-cols-2 md:grid-cols-[4fr,3fr,2fr,3fr] gap-2 text-sm text-gray-600 mt-2" >
                                        <div class="flex items-center">
                                            <i class="fa fa-clock-o text-gray-400 mr-1"></i>
                                            <span class="record-time">${recorder.msg ? recorder.msg.split(" / ")[0] : "-"}</span>
                                        </div>
                                        <div class="flex items-center">
                                            <i class="fa fa-file-video-o text-gray-400 mr-1"></i>
                                            <span>${recorder.msg ? recorder.msg.split(" / ")[1] : "-"}</span>
                                        </div>
                                        <div class="flex items-center">
                                            <i class="fa fa-film text-gray-400 mr-1"></i>
                                            <span>${recorder.msg ? recorder.msg.split(" / ")[2] : "-"}</span>
                                        </div>
                                        <div class="flex items-center">
                                            <i class="fa fa-signal text-gray-400 mr-1"></i>
                                            <span>${recorder.msg ? recorder.msg.split(" / ")[3] : "-"}</span>
                                        </div>
                                    </div>

                                    <div class="mt-2 text-xs text-gray-500 truncate" title="${recorder.path || "无路径信息"}">
                                        <i class="fa fa-folder-open mr-1"></i>
                                        保存路径: ${recorder.path || "无路径信息"}
                                    </div>` : ""}
                                </div>
                                <!-- 操作按钮 -->
                                <div class="flex flex-wrap gap-2">
                                    <a href="${room.roomUrl || "#"}" target="_blank"
                                       class="inline-flex items-center px-3 py-1.5 bg-primary text-white rounded-lg text-sm hover:bg-primary/50 transition-colors">
                                        <span><i class="fa fa-external-link mr-1"></i>进入直播间</span>
                                    </a>
                                    <button onclick="showFileSelectModal('${item.key}')" class="inline-flex items-center px-3 py-1.5 bg-white border border-gray-300 rounded-lg text-sm hover:bg-yellow-600 transition-colors">
                                        <span><i class="fa fa-folder text-yellow-400 mr-1"></i>直播记录</span>
                                    </button>
                                    <button onclick="actionMonitor('${item.key}',false)" class="inline-flex items-center px-3 py-1.5 bg-white border border-gray-300 rounded-lg text-sm hover:bg-gray-500 transition-colors">
                                      <span class="text-danger"><i class="fa fa-stop mr-1"></i>停止监控</span>
                                    </button>

                                    <button onclick="actionRecord('${item.key}',${!isRecord})" class="inline-flex items-center px-3 py-1.5 bg-white border border-gray-300 rounded-lg text-sm hover:bg-gray-500 transition-colors">
                                        <span class="${isRecord ? "text-warning" : "text-success"}"><i class="fa ${isRecord ? "fa-pause" : "fa-play"} mr-1"></i>${isRecord ? "停止录制" : "开始录制"}</span>
                                    </button>

                                    <button onclick="actionSetting('${item.key}','${btoa(JSON.stringify(room.setting))}')" class="inline-flex items-center px-3 py-1.5 bg-gray-500 border text-white border-gray-300 rounded-lg text-sm hover:bg-gray-800 transition-colors">
                                        <span class="text-white"> <i class="fa fa-cog mr-1"></i>设置</span>
                                    </button>
                                   </div>
                                </div>`;
        return div;
    }

    // 创建未直播房间元素
    function createNotLivingRoomElement(item, index) {
        const room = item.room;
        const running = item.isRunning;
        // 创建元素
        const div = document.createElement("div");
        div.className =
            "bg-white rounded-xl overflow-hidden card-shadow hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1 opacity-0";
        div.style.animation = `fadeIn 0.3s ease-in-out ${
            index * 0.1
        }s forwards`;

        // 平台特定信息网格
        let infoGridItems = `<div class="flex items-center">
                                <i class="fa fa-key text-gray-400 mr-1"></i>
                                <span>标识: ${item.key || "未知"}</span>
                            </div>
                            <div class="flex items-center" title="${formatDate(new Date(item.isRunning ? item.startTime : item.endTime))}">
                                <i class="fa fa-refresh text-gray-400 mr-1"></i>
                                监控状态:<span class="${running ? "bg-green-100" : "bg-red-100"} text-gray-600 px-2 py-0.5 rounded ml-1">
                                ${running ? "运行中" : "已停止"}</span>
                            </div>
                            <div class="flex items-center">
                                <i class="fa fa-bell text-gray-400 mr-1"></i>
                                开播提醒:<span class="${room.setting && room.setting.isNotice ? "bg-green-100" : "bg-red-100"} text-gray-600 px-2 py-0.5 rounded ml-1">
                                        ${room.setting && room.setting.isNotice ? "已开启" : "未开启"}</span>
                            </div>`;
        if (room.platform === "Bili") {
            // 哔哩哔哩房间显示粉丝数
            infoGridItems = `${infoGridItems}
                             <div class="flex items-center">
                                <i class="fa fa-users text-gray-400 mr-1"></i>
                                <span>粉丝: ${room.followers || 0}</span>
                            </div>`;
        }

        div.innerHTML = `${createRoomHeadElement(item)}
                            <!-- 卡片内容 -->
                            <div class="p-4">
                                <!-- 房间信息 -->
                                <div class="flex flex-col md:flex-row gap-4 mb-4">
                                    <div class="relative flex-shrink-0">
                                        ${room.cover ? `<img src="${room.cover}" alt="直播封面" class="w-full md:w-48 h-32 object-cover rounded-lg">` : `<div class="w-full md:w-48 h-32 bg-gray-100 rounded-lg flex items-center justify-center text-gray-400"><i class="fa fa-television text-3xl"></i></div>`}
                                    </div>
                                    <div class="flex-1">
                                        <h4 class="font-medium text-gray-500 line-clamp-2 mb-2">当前未开启直播</h4>
                                        <div class="grid grid-cols-2 gap-2 text-sm text-gray-600">
                                            ${infoGridItems}
                                        </div>
                                    </div>
                                </div>

                                <!-- 操作按钮 -->
                                <div class="flex flex-wrap gap-2">
                                    <a href="${room.roomUrl || "#"}" target="_blank"
                                       class="inline-flex items-center px-3 py-1.5 bg-white border border-gray-300 rounded-lg text-sm hover:bg-primary transition-colors">
                                        <span><i class="fa fa-external-link mr-1"></i>访问直播间</span>
                                    </a>
                                    <button onclick="showFileSelectModal('${item.key}')" class="inline-flex items-center px-3 py-1.5 bg-white border border-gray-300 rounded-lg text-sm hover:bg-yellow-600 transition-colors">
                                        <span><i class="fa fa-folder text-yellow-400 mr-1"></i>直播记录</span>
                                    </button>

                                    <button onclick="actionMonitor('${item.key}',${!running})" class="inline-flex items-center px-3 py-1.5 bg-white border border-gray-300 rounded-lg text-sm hover:bg-gray-500 transition-colors">
                                         <span class="${running ? "text-warning" : "text-success"}"><i class="fa ${running ? "fa-stop" : "fa-play"} mr-1"></i>${running ? "停止" : "开启"}监控</span>
                                    </button>

                                  <button onclick="
                                    actionSetting('${item.key}','${btoa(JSON.stringify(item.room.setting))}')"  class="inline-flex items-center px-3 py-1.5 bg-gray-500 border text-white border-gray-300 rounded-lg text-sm hover:bg-gray-800 transition-colors">
                                    <span class="text-white"> <i class="fa fa-cog mr-1"></i>设置</span>
                                  </button>
                                </div>
                            </div>`;
        return div;
    }
    
    // 获取弹窗元素
    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modalTitle");
    const modalBody = document.getElementById("modalBody");
    const modalFooter = document.getElementById("modalFooter");
    const modalClose = document.getElementById("modalClose");

    modalClose.addEventListener("click", closeModal);

    // 打开弹窗
    function openModal() {
        modal.classList.add("active");
        document.body.style.overflow = "hidden";
    }

    // 关闭弹窗
    function closeModal() {
        modal.classList.remove("active");
        document.body.style.overflow = "";
    }

    // 清除弹窗内容
    function clearModalContent() {
        modalTitle.textContent = "";
        modalBody.innerHTML = "";
        modalFooter.innerHTML = "";
    }

    // 添加按钮到弹窗底部
    function addModalButton(text, className, onClick) {
        const button = document.createElement("button");
        button.textContent = text;
        button.className = `btn ${className}`;
        button.addEventListener("click", onClick);
        modalFooter.appendChild(button);
        return button;
    }

    // 设置弹窗内容
    function setModalContent(title, content, buttons = []) {
        clearModalContent();

        // 设置标题
        modalTitle.textContent = title;

        // 设置内容（支持HTML）
        modalBody.innerHTML = content;

        // 添加按钮
        buttons.forEach((btn) => {
            addModalButton(btn.text, btn.className, btn.onClick);
        });

        openModal();
    }
</script>
</body>
</html>
